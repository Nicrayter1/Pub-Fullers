name: Database Backup

on:
  schedule:
    - cron: '0 2 * * *'   # каждый день в 02:00 UTC (05:00 Астана)
  workflow_dispatch:       # кнопка ручного запуска в GitHub UI

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run pg_dump
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          pg_dump \
            --no-acl \
            --no-owner \
            -Fc \
            "$DB_URL" \
            -f backup_$(date +%Y%m%d_%H%M%S).dump

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: qambar-backup-${{ github.run_id }}
          path: "*.dump"
          retention-days: 30    # хранится 30 дней, потом удаляется
